<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BI Executivo Mobile</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --sidebar-bg: #0f172a;
            --accent: #10b981;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-color); color: var(--text-main); padding-bottom: 70px; /* Espaço para o menu mobile */ }

        /* Sidebar (Desktop) / Hide on Mobile */
        .sidebar { 
            position: fixed; left: 0; top: 0; bottom: 0; width: 260px; 
            background: var(--sidebar-bg); color: white; display: none; 
            flex-direction: column; z-index: 100;
        }

        /* Top Bar Mobile */
        .top-header {
            background: var(--sidebar-bg); color: white; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 90; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .top-header h2 { font-size: 1.1rem; color: var(--accent); }

        /* Main Content */
        .main { padding: 15px; width: 100%; max-width: 1200px; margin: 0 auto; }

        /* KPI Cards - 2 colunas no mobile */
        .kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .kpi-card { background: white; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; text-align: center; }
        .kpi-card i { font-size: 1.2rem; color: var(--accent); margin-bottom: 5px; display: block; }
        .kpi-card span { font-size: 0.7rem; color: #64748b; text-transform: uppercase; font-weight: 700; display: block; }
        .kpi-card strong { font-size: 1rem; display: block; margin-top: 3px; }
        .kpi-full { grid-column: span 2; } /* Card de Faturamento ocupa a largura toda */

        /* Container do Gráfico */
        .chart-box { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; height: 300px; border: 1px solid #e2e8f0; }

        /* Listas e Stores */
        .view-section { display: none; animation: fadeIn 0.3s ease; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .store-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #e2e8f0; }
        .store-header { font-weight: 700; font-size: 0.95rem; border-bottom: 1px solid #f1f5f9; padding-bottom: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .data-line { display: flex; justify-content: space-between; font-size: 0.85rem; padding: 5px 0; }
        .data-line span { color: #64748b; }
        .month-label { font-size: 1.1rem; font-weight: 800; margin: 20px 0 10px 0; color: #0f172a; padding-left: 5px; border-left: 4px solid var(--accent); }

        /* Bottom Navigation (Mobile Only) */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: 65px;
            background: white; border-top: 1px solid #e2e8f0;
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-item { text-align: center; color: #94a3b8; font-size: 0.7rem; flex: 1; padding: 10px; transition: 0.2s; }
        .nav-item i { font-size: 1.3rem; display: block; margin-bottom: 4px; }
        .nav-item.active { color: var(--accent); }

        /* Loader */
        #loader { position: fixed; inset: 0; background: white; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Desktop Adjustments */
        @media (min-width: 768px) {
            .sidebar { display: flex; }
            .bottom-nav { display: none; }
            .main { margin-left: 260px; padding: 40px; }
            .top-header { display: none; }
            .kpi-grid { grid-template-columns: repeat(3, 1fr); }
            .kpi-full { grid-column: span 1; }
            .store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 15px; font-weight: 600;">A carregar BI...</p>
    </div>

    <div class="top-header">
        <h2><i class="fas fa-chart-line"></i> BI MOBILE</h2>
        <span style="font-size: 0.8rem; opacity: 0.8;">Q1 Jan-Mar</span>
    </div>

    <aside class="sidebar">
        <div style="padding: 25px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1);">
            <h2 style="color: var(--accent);">BI EXEC</h2>
        </div>
        <div style="padding: 20px;">
            <p style="color: #64748b; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px;">Menu</p>
        </div>
        </aside>

    <main class="main">
        <div class="kpi-grid">
            <div class="kpi-card kpi-full">
                <i class="fas fa-wallet"></i>
                <span>Faturamento Q1</span>
                <strong id="kpi-fat">R$ 0,00</strong>
            </div>
            <div class="kpi-card">
                <i class="fas fa-percent"></i>
                <span>Comissão</span>
                <strong id="kpi-com">R$ 0,00</strong>
            </div>
            <div class="kpi-card">
                <i class="fas fa-tag"></i>
                <span>Vendas</span>
                <strong id="kpi-vendas">0</strong>
            </div>
        </div>

        <section id="dashboard" class="view-section active">
            <div class="chart-box">
                <canvas id="rankingChart"></canvas>
            </div>
            <div id="list-geral"></div>
        </section>

        <section id="equipe" class="view-section">
            <div id="list-equipe"></div>
        </section>

        <section id="financeiro" class="view-section">
            <div id="list-financeiro"></div>
        </section>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('dashboard', this)">
            <i class="fas fa-th-large"></i>Início
        </div>
        <div class="nav-item" onclick="switchTab('equipe', this)">
            <i class="fas fa-users"></i>Equipe
        </div>
        <div class="nav-item" onclick="switchTab('financeiro', this)">
            <i class="fas fa-hand-holding-usd"></i>Caixa
        </div>
    </nav>

    <script>
        // CONFIGURAÇÃO: COLE SUA URL DO GOOGLE AQUI
        const urlAppScript = 'https://script.google.com/macros/s/AKfycbwaLszQYJYr_vut3peyr5Df1jqa1fbKtEsmk48SfWVFMXrI5jFSMhoFitbETb2Hq5Fg7w/exec';

        const mesesNomes = ["Janeiro", "Fevereiro", "Março"];
        const fmt = v => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);

        function switchTab(id, el) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            window.scrollTo(0,0);
        }

        async function init() {
            try {
                const res = await fetch(urlAppScript);
                const data = await res.json();
                document.getElementById('loader').style.display = 'none';
                processar(data);
            } catch (e) {
                alert("Erro ao carregar dados. Verifique sua conexão.");
            }
        }

        function processar(dados) {
            const est = { 1: {}, 2: {}, 3: {} };
            let fatTotal = 0, comTotal = 0, vlsSet = new Set();
            let rankLojas = {};

            dados.forEach(r => {
                const loja = r['Loja'];
                const dataStr = r['Dt. venda'];
                if(!loja || !dataStr) return;

                let mes = 0;
                if(dataStr.includes('/')) mes = parseInt(dataStr.split('/')[1]);
                else if(dataStr.includes('-')) mes = parseInt(dataStr.split('-')[1]);

                if(mes >= 1 && mes <= 3) {
                    const v = parseFloat(String(r['Vlr. pgto.']).replace(',','.')) || 0;
                    const c = parseFloat(String(r['Vlr. comissão']).replace(',','.')) || 0;
                    const cargo = String(r['Função no momento da venda']).toUpperCase();
                    const forma = r['Forma pagamento'] || 'Outros';

                    fatTotal += v; comTotal += c; vlsSet.add(r['Nr. venda']);
                    rankLojas[loja] = (rankLojas[loja] || 0) + v;

                    if(!est[mes][loja]) {
                        est[mes][loja] = { total: 0, formas: {}, ger: {f:0, c:0}, ven: {f:0, c:0} };
                    }
                    const ref = est[mes][loja];
                    ref.total += v;
                    ref.formas[forma] = (ref.formas[forma] || 0) + v;
                    if(cargo.includes('GERENTE')) { ref.ger.f += v; ref.ger.c += c; }
                    else { ref.ven.f += v; ref.ven.c += c; }
                }
            });

            document.getElementById('kpi-fat').innerText = fmt(fatTotal);
            document.getElementById('kpi-com').innerText = fmt(comTotal);
            document.getElementById('kpi-vendas').innerText = vlsSet.size;

            renderCharts(rankLojas);
            renderLists(est);
        }

        function renderCharts(dados) {
            const sorted = Object.entries(dados).sort((a,b) => b[1]-a[1]).slice(0, 5);
            new Chart(document.getElementById('rankingChart'), {
                type: 'bar',
                data: {
                    labels: sorted.map(l => l[0].substring(0,10)),
                    datasets: [{ label: 'Top 5 Lojas', data: sorted.map(l => l[1]), backgroundColor: '#10b981', borderRadius: 5 }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: {display: false} } }
            });
        }

        function renderLists(est) {
            const listG = document.getElementById('list-geral');
            const listE = document.getElementById('list-equipe');
            const listF = document.getElementById('list-financeiro');

            mesesNomes.forEach((nome, i) => {
                const m = i + 1;
                const lojas = Object.entries(est[m]).sort((a,b) => b[1].total - a[1].total);
                
                if(lojas.length > 0) {
                    const div = `<div class="month-label">${nome}</div>`;
                    listG.innerHTML += div; listE.innerHTML += div; listF.innerHTML += div;

                    lojas.forEach(([nomeLoja, d]) => {
                        listG.innerHTML += `
                            <div class="store-card">
                                <div class="store-header"><span>${nomeLoja}</span> <span style="color:var(--accent)">${fmt(d.total)}</span></div>
                                <div class="data-line"><span>Comissões</span><strong>${fmt(d.ger.c + d.ven.c)}</strong></div>
                            </div>`;
                        listE.innerHTML += `
                            <div class="store-card">
                                <div class="store-header">${nomeLoja}</div>
                                <div class="data-line"><span>Fat. Gerente</span><strong>${fmt(d.ger.f)}</strong></div>
                                <div class="data-line"><span>Fat. Vendedores</span><strong>${fmt(d.ven.f)}</strong></div>
                            </div>`;
                        listF.innerHTML += `
                            <div class="store-card">
                                <div class="store-header">${nomeLoja}</div>
                                ${Object.entries(d.formas).map(f => `<div class="data-line"><span>${f[0]}</span><strong>${fmt(f[1])}</strong></div>`).join('')}
                            </div>`;
                    });
                }
            });
        }

        init();
    </script>
</body>
</html>
